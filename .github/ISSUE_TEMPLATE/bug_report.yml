name: Bug report
description: Report a reproducible defect in the Stackure JavaScript SDK
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you do, what did you see
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Smallest JS/TS snippet that reproduces the issue
      render: typescript
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "1.0.0 or commit SHA"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "v20.11.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      render: shell
