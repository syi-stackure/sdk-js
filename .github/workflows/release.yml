name: Release (date-based auto)

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Compute date-based version
        id: v
        run: |
          version="1.$(date -u +%Y%m%d).${GITHUB_RUN_NUMBER}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - name: Set version in package.json
        run: npm pkg set version="${{ steps.v.outputs.version }}"
      - name: Pack
        id: pack
        run: echo "tarball=$(npm pack --silent)" >> "$GITHUB_OUTPUT"
      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
      - name: Publish to npm (via OIDC trusted publisher)
        run: npm publish --provenance --access public
      - name: Create + push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.v.outputs.tag }}"
          git push origin "${{ steps.v.outputs.tag }}"
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          files: ${{ steps.pack.outputs.tarball }}
          generate_release_notes: true
