name: Release on VERSION bump

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read version
        id: v
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - name: Should release?
        id: gate
        run: |
          if git rev-parse --verify "refs/tags/${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.v.outputs.tag }} already exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - name: Pack
        id: pack
        run: echo "tarball=$(npm pack --silent)" >> "$GITHUB_OUTPUT"
      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
      - name: Publish to npm (via OIDC trusted publisher)
        run: npm publish --provenance --access public
      - name: Create + push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check.outputs.tag }}"
          git push origin "${{ needs.check.outputs.tag }}"
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          files: ${{ steps.pack.outputs.tarball }}
          generate_release_notes: true
